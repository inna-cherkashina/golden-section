<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vilavi-Go</title>
    <meta
      name="description"
      content="Развивай свой бизнес-проект с сибирской млм-компанией и обрети финансовую независимость." />
    <link rel="shortcut icon" href="https://www.vilavi.com/img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <div class="box-center">
        <div class="desktop-header__container">
          <div class="header-flex__container">
            <a href="https://www.vilavi.com/">
              <img class="header-logo" src="./images/Logo.svg" alt="logo" />
            </a>
            <ul class="header-menu-flex__container">
              <li class="list-item"><a href="#about-event">О мероприятии</a></li>
              <li class="list-item"><a href="#place-event">Место проведения</a></li>
              <li class="list-item"><a href="#schedule">Программа</a></li>
              <li class="list-item"><a href="#contacts">Контакты</a></li>
            </ul>
            <img class="burger-menu" src="./images/burger-menu.svg" alt="burger-menu" />
            <img class="burger-close disactive" src="./images/close.svg" alt="close" />
          </div>

          <div class="mobile-menu mobile-disactive">
            <ul class="header-mobile-menu__container">
              <li class="list-item"><a href="#about-event">О мероприятии</a></li>
              <li class="list-item"><a href="#place-event">Место проведения</a></li>
              <li class="list-item"><a href="#schedule">Программа</a></li>
              <li class="list-item"><a href="#contacts">Контакты</a></li>
            </ul>
            <div class="mobile-icons__container">
              <a
                class="mobile-gradient-link"
                href="https://office.vilavi.com/Account/Login?ReturnUrl=%2FEvent%2FVilaviGoTickets">
                Купить билет
              </a>
              <div class="icons-items">
                <a href="https://ok.ru/group/70000007377035"
                  ><img src="./images/OK_pink.svg" alt="icons"
                /></a>
                <a href="https://t.me/Vilavi_official_channel"
                  ><img src="./images/Telegram_pink.svg" alt="icons"
                /></a>
                <a href="https://vk.com/vilavi_official?from=search"
                  ><img src="./images/VK_pink.svg" alt="icons"
                /></a>
                <a href="https://www.youtube.com/@vilavi_official/featured"
                  ><img src="./images/YouTube_pink.svg" alt="icons"
                /></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section class="section-banner">
        <div class="box-center-banner">
          <div class="banner-section__container">
            <div class="banner-info-container">
              <div class="flex-info__container">
                <h1 class="banner-title">VILAVI GO 2026</h1>
                <div class="banner-text">
                  <p>15-17 мая</p>
                  <p>Калининград</p>
                </div>
              </div>
              <p>VILAVI GO - это главное событие VILAVI!</p>
              <img class="arrows-down" src="./images/arrows-down.svg" alt="стрелочки вниз" />
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="slick.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
